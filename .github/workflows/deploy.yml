name: Deploy

on:
  workflow_run:
    workflows: [ CI ]
    types: [ completed ]

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 🚀 Deploy a VPS via PM2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          command_timeout: 30m
          script: |
            set -e
            echo "🚀 Iniciando deploy con PM2..."
            cd /var/www/plataforma-servicios-ceres
            
            # 1. Obtener cambios
            git fetch origin main && git reset --hard origin/main
            
            # 2. Verificar .env (Usamos el que tú configuraste manualmente en el VPS)
            if [ ! -f .env ]; then
              echo "❌ Error: El archivo .env no existe en /var/www/plataforma-servicios-ceres"
              exit 1
            fi
            echo "✅ Usando configuración .env local del servidor."
            
            # 3. Instalar dependencias y Build (Nativo, sin Docker)
            echo "📦 Instalando dependencias..."
            npm install
            
            echo "🗄️ Generando Prisma Client..."
            npx prisma generate
            
            echo "🔨 Construyendo aplicación (Next.js)..."
            npm run build
            
            echo "🗄️ Aplicando migraciones de base de datos..."
            npx prisma migrate deploy
            
            # 4. Reiniciar con PM2 (Unificado como ROOT)
            echo "🔄 Actualizando servicios Ceres..."
            
            # Al no pasar --env, PM2 respeta el entorno del sistema y Next.js carga su .env
            sudo pm2 startOrRestart ecosystem.config.js
            sudo pm2 save
            
            echo "✅ ¡Deploy Exitoso! App corriendo en puerto 3012."
